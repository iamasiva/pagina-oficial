<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA MASIVA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep: #0B1E6D; --blue-mid: #1E3A8A; --blue-elec: #2F6BFF;
      --blue-dark: #050F3A; --black: #050505; --white: #FFFFFF;
      --gray: #D1D5DB; --cyan: #00E5FF; --green: #00FF9C;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--black); color: var(--white); line-height: 1.6; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ─── NAVBAR ─────────────────────────────────────────────── */
    .app-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw; height: 70px;
      background: linear-gradient(to bottom, rgba(5,15,58,0.98) 0%, transparent 100%);
      transition: background 0.3s;
    }
    .app-nav.scrolled { background: rgba(5,15,58,0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(47,107,255,0.12); }
    .app-nav-logo { font-size: 1.6rem; font-weight: 900; letter-spacing: 0.1em; }
    .app-nav-right { display: flex; align-items: center; gap: 14px; }
    .app-nav-name { font-size: 0.85rem; color: var(--gray); }
    .app-nav-logout { background: transparent; border: 1px solid rgba(47,107,255,0.4); color: var(--gray); padding: 8px 18px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; }
    .app-nav-logout:hover { background: rgba(47,107,255,0.15); border-color: var(--blue-elec); color: var(--white); }
    .app-nav-admin { background: rgba(47,107,255,0.1); border: 1px solid rgba(47,107,255,0.3); color: var(--blue-elec); padding: 8px 18px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; }
    .app-nav-admin:hover { background: rgba(47,107,255,0.2); }
    .hidden { display: none !important; }

    /* ─── FILTER BAR ─────────────────────────────────────────── */
    .filter-bar {
      position: fixed; top: 70px; left: 0; right: 0; z-index: 90;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 5vw;
      background: linear-gradient(to bottom, rgba(5,15,58,0.96) 0%, transparent 100%);
      backdrop-filter: blur(8px);
    }
    .filter-btn {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: var(--gray); padding: 7px 18px; border-radius: 20px;
      font-size: 0.82rem; font-weight: 600; transition: all 0.2s; white-space: nowrap;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.14); color: var(--white); }
    .filter-btn.active { background: var(--white); color: #050F3A; border-color: var(--white); }
    .cat-dropdown { position: relative; }
    .cat-menu {
      position: absolute; top: calc(100% + 8px); left: 0;
      background: #0b1535; border: 1px solid rgba(47,107,255,0.22);
      border-radius: 10px; padding: 8px 0; min-width: 220px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      display: none; flex-direction: column; z-index: 200;
    }
    .cat-menu.open { display: flex; }
    .cat-menu-item { padding: 10px 18px; font-size: 0.86rem; color: var(--gray); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .cat-menu-item:hover { background: rgba(47,107,255,0.1); color: var(--white); }
    .cat-menu-item.active { color: var(--blue-elec); font-weight: 700; }

    /* ─── HERO ───────────────────────────────────────────────── */
    .app-hero {
      position: relative; width: 100%; height: 72vh; min-height: 460px;
      display: flex; align-items: flex-end; padding: 0 5vw 64px; overflow: hidden;
      background: linear-gradient(135deg, #050F3A 0%, #0B1E6D 55%, #1E3A8A 100%);
      margin-top: 0;
    }
    .app-hero-bg { position: absolute; inset: 0; object-fit: cover; width: 100%; height: 100%; }
    .app-hero::before {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at 72% 40%, rgba(47,107,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 80%, rgba(0,229,255,0.06) 0%, transparent 50%),
        linear-gradient(to right, rgba(5,15,58,0.96) 0%, rgba(5,15,58,0.4) 55%, transparent 100%),
        linear-gradient(to top, rgba(5,5,5,0.95) 0%, transparent 45%);
    }
    .app-hero::after {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(47,107,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(47,107,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at 70% 50%, transparent 30%, black 80%);
    }
    .app-hero-content { position: relative; z-index: 2; max-width: 540px; }
    .app-hero-badge { display: inline-block; background: var(--blue-elec); color: var(--white); font-size: 0.62rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; margin-bottom: 18px; }
    .app-hero-title { font-size: clamp(2rem, 4.5vw, 3.4rem); font-weight: 900; line-height: 1.05; letter-spacing: -0.025em; margin-bottom: 14px; text-shadow: 0 2px 30px rgba(0,0,0,0.5); }
    .app-hero-desc { font-size: 1rem; color: #9aacbf; line-height: 1.65; margin-bottom: 30px; max-width: 420px; }
    .app-hero-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .hero-badge-type { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; }
    .hero-badge-gratis { background: rgba(0,255,156,0.12); border: 1px solid rgba(0,255,156,0.35); color: var(--green); }
    .hero-badge-premium { background: rgba(47,107,255,0.12); border: 1px solid rgba(47,107,255,0.35); color: var(--blue-elec); }
    .app-hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .app-btn-play { background: var(--white); color: #050F3A; border: none; padding: 13px 30px; border-radius: 6px; font-size: 0.95rem; font-weight: 800; display: flex; align-items: center; gap: 8px; transition: background 0.2s, transform 0.15s; }
    .app-btn-play:hover { background: var(--gray); transform: translateY(-1px); }
    .app-btn-info { background: rgba(255,255,255,0.12); color: var(--white); border: 1px solid rgba(255,255,255,0.2); padding: 13px 28px; border-radius: 6px; font-size: 0.95rem; font-weight: 700; backdrop-filter: blur(8px); transition: background 0.2s; }
    .app-btn-info:hover { background: rgba(255,255,255,0.22); }

    /* ─── CONTENT ────────────────────────────────────────────── */
    .app-content { background: var(--black); padding: 36px 5vw 80px; }
    .app-row { margin-bottom: 44px; }
    .app-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .app-row-title { font-size: 1.15rem; font-weight: 700; color: var(--white); letter-spacing: 0.01em; }
    .scroll-wrapper { position: relative; }
    .app-track { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; padding-top: 6px; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; }
    .app-track::-webkit-scrollbar { display: none; }
    .scroll-arrow { position: absolute; top: 50%; transform: translateY(-60%); z-index: 10; width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(47,107,255,0.35); background: rgba(5,5,5,0.9); color: var(--white); font-size: 1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(8px); transition: all 0.2s; opacity: 0.85; }
    .scroll-arrow:hover { background: rgba(47,107,255,0.25); border-color: var(--blue-elec); box-shadow: 0 0 16px rgba(47,107,255,0.35); opacity: 1; }
    .scroll-arrow.left { left: -20px; }
    .scroll-arrow.right { right: -20px; }

    /* ─── CARDS ──────────────────────────────────────────────── */
    .app-card { flex: 0 0 175px; height: 252px; border-radius: 10px; position: relative; overflow: hidden; cursor: pointer; border: 1px solid rgba(47,107,255,0.1); transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.2s; }
    .app-card:hover { transform: scale(1.07) translateY(-7px); box-shadow: 0 22px 55px rgba(0,0,0,0.75), 0 0 0 1px rgba(47,107,255,0.5); border-color: rgba(47,107,255,0.5); z-index: 5; }
    .app-card:nth-child(1)  { background: linear-gradient(160deg, #060c2a 0%, #0e1f5c 100%); }
    .app-card:nth-child(2)  { background: linear-gradient(160deg, #050b26 0%, #091749 100%); }
    .app-card:nth-child(3)  { background: linear-gradient(160deg, #07102e 0%, #101d5e 100%); }
    .app-card:nth-child(4)  { background: linear-gradient(160deg, #060a25 0%, #0c1852 100%); }
    .app-card:nth-child(5)  { background: linear-gradient(160deg, #07102f 0%, #111f62 100%); }
    .app-card:nth-child(6)  { background: linear-gradient(160deg, #050d2a 0%, #0a1a55 100%); }
    .app-card:nth-child(7)  { background: linear-gradient(160deg, #060f2e 0%, #0f1e5f 100%); }
    .app-card:nth-child(8)  { background: linear-gradient(160deg, #050b26 0%, #0b1a50 100%); }
    .app-card:nth-child(9)  { background: linear-gradient(160deg, #060e2c 0%, #101d5c 100%); }
    .app-card:nth-child(10) { background: linear-gradient(160deg, #060c28 0%, #0e1c5a 100%); }
    .app-card-cover { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .app-card::before { content: ''; position: absolute; inset: 0; z-index: 1; background: radial-gradient(ellipse at 50% 10%, rgba(47,107,255,0.2) 0%, transparent 65%), linear-gradient(180deg, transparent 38%, rgba(5,5,5,0.95) 100%); }
    .app-card::after { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1.5px; background: linear-gradient(90deg, transparent, var(--blue-elec), transparent); opacity: 0.55; z-index: 2; }
    .app-card-rank { position: absolute; bottom: -12px; left: -2px; font-size: 5.8rem; font-weight: 900; line-height: 1; color: rgba(255,255,255,0.06); letter-spacing: -0.06em; user-select: none; pointer-events: none; z-index: 2; }
    .app-card-badge { position: absolute; top: 11px; right: 11px; font-size: 0.58rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; z-index: 3; }
    .badge-gratis { background: rgba(0,255,156,0.12); border: 1px solid rgba(0,255,156,0.35); color: var(--green); }
    .badge-premium { background: rgba(47,107,255,0.12); border: 1px solid rgba(47,107,255,0.35); color: var(--blue-elec); }
    .badge-tuya { background: rgba(0,229,255,0.12); border: 1px solid rgba(0,229,255,0.35); color: var(--cyan); }
    .app-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 44px 13px 14px; z-index: 3; }
    .app-card-title { font-size: 0.83rem; font-weight: 700; color: var(--white); letter-spacing: 0.02em; }
    .app-card-tag { font-size: 0.68rem; color: #4a6080; margin-top: 3px; }
    .app-card.locked::before { background: rgba(5,5,5,0.45), radial-gradient(ellipse at 50% 10%, rgba(47,107,255,0.1) 0%, transparent 65%), linear-gradient(180deg, transparent 38%, rgba(5,5,5,0.95) 100%); }
    .app-card-lock { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -65%); font-size: 1.4rem; opacity: 0.45; z-index: 3; }
    .app-empty { color: #3d5268; font-size: 0.9rem; padding: 24px 0; font-style: italic; }

    /* ─── FILTERED VIEW ──────────────────────────────────────── */
    #filteredSection { display: none; }
    #filteredSection.active { display: block; }
    #mainSections.filtered { display: none; }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 720px) {
      .app-hero { height: 58vh; padding-bottom: 44px; }
      .app-hero-desc { display: none; }
      .app-card { flex: 0 0 145px; height: 210px; }
      .app-card-rank { font-size: 4.5rem; }
      .app-nav-name { display: none; }
      .scroll-arrow { display: none; }
      .filter-bar { gap: 7px; padding: 10px 4vw; overflow-x: auto; }
    }
  </style>
</head>
<body>

  <!-- ═══ NAVBAR ═══════════════════════════════════════════════ -->
  <nav class="app-nav" id="appNav">
    <span class="app-nav-logo">IA MASIVA</span>
    <div class="app-nav-right">
      <button class="app-nav-admin hidden" id="btnAdmin" onclick="window.location.href='admin.html'">Admin</button>
      <span class="app-nav-name" id="appNavName"></span>
      <button class="app-nav-logout" id="appLogout">Salir</button>
    </div>
  </nav>

  <!-- ═══ FILTER BAR ═══════════════════════════════════════════ -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn" id="filterAll" onclick="setFilter('all')">Todo</button>
    <button class="filter-btn" id="filterGratis" onclick="setFilter('gratis')">Gratis</button>
    <button class="filter-btn" id="filterPremium" onclick="setFilter('premium')">Premium</button>
    <div class="cat-dropdown">
      <button class="filter-btn" id="filterCatBtn" onclick="toggleCatMenu()">Categorías ▾</button>
      <div class="cat-menu" id="catMenu"></div>
    </div>
  </div>

  <!-- ═══ HERO ═════════════════════════════════════════════════ -->
  <div class="app-hero" id="appHero" style="padding-top: 130px;">
    <div class="app-hero-content" id="heroContent">
      <div class="app-hero-badge">Destacada esta semana</div>
      <h1 class="app-hero-title" id="heroTitle">Bienvenido a IA MASIVA</h1>
      <p class="app-hero-desc" id="heroDesc">Explora las guías disponibles y aprende a usar inteligencia artificial de forma práctica y aplicada.</p>
      <div class="app-hero-meta" id="heroMeta"></div>
      <div class="app-hero-actions">
        <button class="app-btn-play" id="heroBtn">&#9654; Ver guía</button>
      </div>
    </div>
  </div>

  <!-- ═══ CONTENIDO ════════════════════════════════════════════ -->
  <div class="app-content">

    <!-- Vista filtrada -->
    <div id="filteredSection">
      <div class="app-row">
        <div class="app-row-header">
          <h2 class="app-row-title" id="filteredTitle">Resultados</h2>
        </div>
        <div class="scroll-wrapper">
          <button class="scroll-arrow left" onclick="scrollRow('rowFiltered', -1)">&#8592;</button>
          <div class="app-track" id="rowFiltered"></div>
          <button class="scroll-arrow right" onclick="scrollRow('rowFiltered', 1)">&#8594;</button>
        </div>
      </div>
    </div>

    <!-- Secciones principales -->
    <div id="mainSections">

      <div class="app-row" id="secNuevo">
        <div class="app-row-header">
          <h2 class="app-row-title">Nuevo en IA MASIVA</h2>
        </div>
        <div class="scroll-wrapper">
          <button class="scroll-arrow left" onclick="scrollRow('rowNuevo', -1)">&#8592;</button>
          <div class="app-track" id="rowNuevo"></div>
          <button class="scroll-arrow right" onclick="scrollRow('rowNuevo', 1)">&#8594;</button>
        </div>
      </div>

      <div class="app-row" id="secPremium">
        <div class="app-row-header">
          <h2 class="app-row-title">Guías Premium</h2>
        </div>
        <div class="scroll-wrapper">
          <button class="scroll-arrow left" onclick="scrollRow('rowPremium', -1)">&#8592;</button>
          <div class="app-track" id="rowPremium"></div>
          <button class="scroll-arrow right" onclick="scrollRow('rowPremium', 1)">&#8594;</button>
        </div>
      </div>

      <div class="app-row" id="secTendencias">
        <div class="app-row-header">
          <h2 class="app-row-title">Tendencias</h2>
        </div>
        <div class="scroll-wrapper">
          <button class="scroll-arrow left" onclick="scrollRow('rowTendencias', -1)">&#8592;</button>
          <div class="app-track" id="rowTendencias"></div>
          <button class="scroll-arrow right" onclick="scrollRow('rowTendencias', 1)">&#8594;</button>
        </div>
      </div>

      <!-- Filas de categorías (generadas dinámicamente) -->
      <div id="catRows"></div>

    </div>
  </div>

  <script>
    // ── SUPABASE ──────────────────────────────────────────────
    const { createClient } = supabase;
    const sb = createClient(
      'https://iyiygnfaxiejtlgkkivs.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5aXlnbmZheGllanRsZ2traXZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTU2ODksImV4cCI6MjA5MjA5MTY4OX0.jfDgQK31XdmY4yd0hMjEgu6b408mGuUSld2-njAujQc'
    );

    const CATEGORIAS = [
      'LLM','Imagen y diseño','Video y animación','Audio, voz y música',
      'Investigación','Coding','Automatización','Marketing',
      'Atención al cliente','Finanzas','Desarrollo','Análisis de datos','Creación de contenido'
    ];

    let allGuides = [];
    let userPurchases = [];
    let activeFilter = 'all';
    let activeCat = null;

    // ── AUTH GUARD ────────────────────────────────────────────
    sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return; }
      initApp(session);
    });
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') window.location.href = 'index.html';
    });
    document.getElementById('appLogout').addEventListener('click', () => sb.auth.signOut());

    // ── NAVBAR SCROLL ─────────────────────────────────────────
    window.addEventListener('scroll', () => {
      document.getElementById('appNav').classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });

    // ── SCROLL ROWS ───────────────────────────────────────────
    function scrollRow(trackId, dir) {
      document.getElementById(trackId).scrollBy({ left: dir * 600, behavior: 'smooth' });
    }

    // ── FILTER LOGIC ──────────────────────────────────────────
    function setFilter(type, cat = null) {
      activeFilter = type;
      activeCat = cat;

      document.getElementById('filterAll').classList.toggle('active', type === 'all');
      document.getElementById('filterGratis').classList.toggle('active', type === 'gratis');
      document.getElementById('filterPremium').classList.toggle('active', type === 'premium');
      document.getElementById('filterCatBtn').classList.toggle('active', type === 'cat');

      document.querySelectorAll('.cat-menu-item').forEach(el => el.classList.remove('active'));
      if (cat) {
        document.querySelectorAll('.cat-menu-item').forEach(el => {
          if (el.dataset.cat === cat) el.classList.add('active');
        });
      }

      closeCatMenu();

      if (type === 'all') {
        document.getElementById('filteredSection').classList.remove('active');
        document.getElementById('mainSections').classList.remove('filtered');
        return;
      }

      let filtered = [];
      if (type === 'gratis')  filtered = allGuides.filter(g => !g.es_premium);
      if (type === 'premium') filtered = allGuides.filter(g => g.es_premium);
      if (type === 'cat')     filtered = allGuides.filter(g => (g.categorias || []).includes(cat));

      document.getElementById('filteredTitle').textContent =
        type === 'gratis'  ? 'Guías gratuitas' :
        type === 'premium' ? 'Guías Premium' : cat;

      document.getElementById('rowFiltered').innerHTML =
        filtered.length ? filtered.map((g, i) => makeCard(g, i + 1)).join('') :
        '<p class="app-empty">No hay guías en esta categoría aún.</p>';

      document.getElementById('filteredSection').classList.add('active');
      document.getElementById('mainSections').classList.add('filtered');
    }

    function toggleCatMenu() { document.getElementById('catMenu').classList.toggle('open'); }
    function closeCatMenu()  { document.getElementById('catMenu').classList.remove('open'); }
    document.addEventListener('click', e => {
      if (!e.target.closest('.cat-dropdown')) closeCatMenu();
    });

    // ── CARD BUILDER ──────────────────────────────────────────
    function makeCard(guide, rank, showRank = false) {
      const purchased = userPurchases.includes(guide.id);
      const locked = guide.es_premium && !purchased;
      const badgeClass = purchased ? 'badge-tuya' : guide.es_premium ? 'badge-premium' : 'badge-gratis';
      const badgeText  = purchased ? '✓ Tuya'    : guide.es_premium  ? 'Premium'       : 'Gratis';
      const cats = (guide.categorias || []).slice(0, 2).join(' · ');
      return `
        <div class="app-card${locked ? ' locked' : ''}" onclick="openGuide('${guide.id}', ${locked})">
          ${guide.portada_url ? `<img src="${guide.portada_url}" class="app-card-cover" />` : ''}
          ${locked ? '<div class="app-card-lock">&#128274;</div>' : ''}
          ${showRank ? `<div class="app-card-rank">${rank}</div>` : ''}
          <span class="app-card-badge ${badgeClass}">${badgeText}</span>
          <div class="app-card-info">
            <div class="app-card-title">${guide.titulo}</div>
            <div class="app-card-tag">${cats}</div>
          </div>
        </div>`;
    }

    function openGuide(id, locked) {
      if (locked) { alert('Esta es una guía Premium. Pronto podrás adquirirla.'); return; }
      const guide = allGuides.find(g => g.id === id);
      if (guide?.contenido_url) window.open(guide.contenido_url, '_blank');
    }

    // ── HERO ──────────────────────────────────────────────────
    function setHero(guide) {
      if (!guide) return;
      document.getElementById('heroTitle').textContent = guide.titulo;
      document.getElementById('heroDesc').textContent = guide.descripcion || '';
      document.getElementById('heroMeta').innerHTML = `
        <span class="hero-badge-type ${guide.es_premium ? 'hero-badge-premium' : 'hero-badge-gratis'}">
          ${guide.es_premium ? 'Premium' : 'Gratis'}
        </span>
        ${(guide.categorias || []).slice(0, 2).map(c => `<span style="font-size:0.8rem;color:#637289;">${c}</span>`).join('<span style="color:#3d5268;">·</span>')}
      `;
      if (guide.portada_url) {
        const hero = document.getElementById('appHero');
        const img = document.createElement('img');
        img.src = guide.portada_url;
        img.className = 'app-hero-bg';
        img.style.opacity = '0.35';
        hero.insertBefore(img, hero.firstChild);
      }
      document.getElementById('heroBtn').onclick = () => openGuide(guide.id, guide.es_premium && !userPurchases.includes(guide.id));
    }

    // ── RENDER SECCIONES ──────────────────────────────────────
    function renderAll() {
      // Nuevo (orden cronológico inverso)
      const nuevo = [...allGuides].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      document.getElementById('rowNuevo').innerHTML = nuevo.length
        ? nuevo.map((g, i) => makeCard(g, i + 1)).join('')
        : '<p class="app-empty">Pronto habrá contenido nuevo.</p>';

      // Premium
      const premium = allGuides.filter(g => g.es_premium).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      document.getElementById('rowPremium').innerHTML = premium.length
        ? premium.map((g, i) => makeCard(g, i + 1)).join('')
        : '<p class="app-empty">Próximamente guías Premium.</p>';

      // Tendencias (top 10)
      const tend = allGuides.slice(0, 10);
      document.getElementById('rowTendencias').innerHTML = tend.length
        ? tend.map((g, i) => makeCard(g, i + 1, true)).join('')
        : '<p class="app-empty">Pronto verás las tendencias aquí.</p>';

      // Categorías: contar guías por cat, tomar top 6
      const catCount = {};
      allGuides.forEach(g => (g.categorias || []).forEach(c => { catCount[c] = (catCount[c] || 0) + 1; }));
      const topCats = Object.entries(catCount)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, 6)
        .map(([cat]) => cat);

      const catRows = document.getElementById('catRows');
      catRows.innerHTML = '';
      topCats.forEach(cat => {
        const guides = allGuides.filter(g => (g.categorias || []).includes(cat));
        const rowId = 'row_' + cat.replace(/\s+/g, '_');
        const div = document.createElement('div');
        div.className = 'app-row';
        div.innerHTML = `
          <div class="app-row-header"><h2 class="app-row-title">${cat}</h2></div>
          <div class="scroll-wrapper">
            <button class="scroll-arrow left" onclick="scrollRow('${rowId}', -1)">&#8592;</button>
            <div class="app-track" id="${rowId}">${guides.map((g, i) => makeCard(g, i + 1)).join('')}</div>
            <button class="scroll-arrow right" onclick="scrollRow('${rowId}', 1)">&#8594;</button>
          </div>`;
        catRows.appendChild(div);
      });

      // Menú de categorías (todas las que tienen guías)
      const catMenu = document.getElementById('catMenu');
      catMenu.innerHTML = '';
      Object.keys(catCount).sort().forEach(cat => {
        const item = document.createElement('div');
        item.className = 'cat-menu-item';
        item.textContent = cat;
        item.dataset.cat = cat;
        item.onclick = () => setFilter('cat', cat);
        catMenu.appendChild(item);
      });

      // Hero: guía más reciente
      setHero(nuevo[0]);
    }

    // ── INIT ──────────────────────────────────────────────────
    async function initApp(session) {
      const nombre = session.user.user_metadata?.nombre || session.user.user_metadata?.full_name || session.user.email;
      document.getElementById('appNavName').textContent = nombre;

      // Verificar si es admin
      const { data: profile } = await sb.from('profiles').select('es_admin').eq('id', session.user.id).single();
      if (profile?.es_admin) document.getElementById('btnAdmin').classList.remove('hidden');

      // Cargar guías publicadas
      const { data: guides } = await sb.from('guides').select('*').eq('publicada', true).order('created_at', { ascending: false });
      allGuides = guides || [];

      // Cargar compras del usuario
      const { data: purchases } = await sb.from('purchases').select('guide_id').eq('user_id', session.user.id);
      userPurchases = (purchases || []).map(p => p.guide_id);

      renderAll();
    }
  </script>
</body>
</html>
